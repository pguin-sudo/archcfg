source = ~/.config/hypr/dms/colors.conf
source = ~/.config/hypr/dms/cursor.conf
source = ~/.config/hypr/dms/layout.conf
source = ~/.config/hypr/dms/windowrules.conf
source = ~/.config/hypr/dms/outputs.conf

xwayland {
    force_zero_scaling = true
}

exec-once = dbus-update-activation-environment --systemd --all

env = XCURSOR_SIZE,24
env = NIXOS_OZONE_WL,1
env = GTK_THEME,Nightfox-Dark
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = ELECTRON_EXTRA_FLAGS,--force-device-scale-factor=1.5
env = XDG_MENU_PREFIX,plasma-

input {
    kb_layout = us,ru
    kb_options = grp:win_space_toggle
    follow_mouse = 1
    repeat_delay = 200
    repeat_rate = 40
    touchpad {
        natural_scroll = true
        disable_while_typing = 0
        tap-to-click = 1
    }
    sensitivity = 0
    accel_profile = linear
}

general {
    gaps_in = 3
    gaps_out = 5
    border_size = 2
    layout = dwindle
}

decoration {
    rounding = 8
    shadow {
        enabled = true
        range = 60
        offset = 1 2
        render_power = 3
        scale = 0.97
    }
    blur {
        enabled = true
        size = 3
        passes = 3
        noise = 0.0117
        contrast = 1.0
        brightness = 1.0
        vibrancy = 0.1696
        vibrancy_darkness = 0.0
        special = true
        new_optimizations = true
    }
    dim_special = 0.2
    active_opacity = 0.95
    inactive_opacity = 0.85
    fullscreen_opacity = 1.0
}

animations {
    enabled = true
    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.38, 0.04, 1, 0.07
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = softAcDecel, 0.26, 0.26, 0.15, 1
    bezier = md2, 0.4, 0, 0.2, 1
    animation = windows, 1, 6, md3_decel, popin 60%
    animation = windowsIn, 1, 6, md3_decel, popin 60%
    animation = windowsOut, 1, 6, md3_accel, popin 60%
    animation = border, 1, 20, default
    animation = fade, 1, 6, md3_decel
    animation = layersIn, 1, 6, menu_decel
    animation = layersOut, 1, 1, menu_accel
    animation = fadeLayersIn, 1, 4, menu_decel
    animation = fadeLayersOut, 1, 1, menu_accel
    animation = workspaces, 1, 14, menu_decel, slide
    animation = specialWorkspace, 1, 6, md3_decel, slidevert
}

dwindle {
    pseudotile = true
    preserve_split = true
    special_scale_factor = 0.8
}

master {
}

gestures {
    gesture = 3, horizontal, workspace
}

misc {
    disable_hyprland_logo = true
    force_default_wallpaper = 0
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    enable_swallow = true
    focus_on_activate = true
    vfr = true
}

$mainMod = SUPER
$terminal = kitty
$explorer = dolphin
$browser = firefox
$top = btop
$editor = nvim
$ide = zeditor

# Power
#bind = $mainMod, Escape, exec, wlogout -p layer-shell
bind = $mainMod SHIFT, Delete, exec, systemctl suspend
bind = $mainMod, Delete, exec, shutdown now
bind = $mainMod CTRL, Delete, exec, reboot
#bind = $mainMod, L, exec, hyprlock

# Windows
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod, F1, exec, $HOME/.config/hypr/scripts/keybind.sh
bind = $mainMod, Q, killactive
bind = $mainMod, F, fullscreen
bind = $mainMod, V, togglesplit
bind = $mainMod, j, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, Q, exit
bind = $mainMod, W, togglefloating
bind = $mainMod SHIFT, P, pin

# System (Overlays)
bind = $mainMod, P, exec, grimshot savecopy area - | swappy -f - -o ~/Photos/screenshots/screenshot-$(date +'%d-%m-%Y_%H%M').png

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, code:49, workspace, -1
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10
bind = $mainMod SHIFT, code:49, movetoworkspacesilent, -1
bind = Alt, Tab, cyclenext

# Special workspaces
bind = $mainMod, S, togglespecialworkspace
bind = $mainMod SHIFT, S, movetoworkspace, special

# DMS
bind = $mainMod, V, exec, dms ipc clipboard toggle
bind = $mainMod SHIFT, W, exec, dms ipc wallpaper next
bind = $mainMod, A, exec, dms ipc spotlight toggle

# Apps
bind = $mainMod, T, exec, $terminal
bind = $mainMod SHIFT, T, exec, Telegram
bind = $mainMod, B, exec, $browser
bind = $mainMod SHIFT, B, exec, $browser -P I2P
bind = $mainMod, E, exec, $explorer
#bind = $mainMod, A, exec, rofi -show drun
bind = $mainMod, Z, exec, $ide
bind = CTRL SHIFT, Escape, exec, $terminal $top
bind = $mainMod, N, exec, $terminal -e zsh -ic "notepad; exit"

# Laptop keys
bind = SUPER SHIFT, code:201, exec, bash ~/.config/hypr/scripts/rotate-screen.sh
bind = SUPER, code:60, exec, sudo -E howdy test
bind = , code:156, exec, $terminal -e zsh -ic "rebuild"

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

binde = $mainMod, left, resizeactive, -40 0
binde = $mainMod, right, resizeactive, 40 0
binde = $mainMod, up, resizeactive, 0 -40
binde = $mainMod, down, resizeactive, 0 40
binde = , XF86AudioMute, exec, pamixer -t
binde = , XF86AudioLowerVolume, exec, pamixer -d 2
binde = , XF86AudioRaiseVolume, exec, pamixer -i 2
binde = , XF86MonBrightnessUp, exec, brightnessctl set 1%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 1%-
binde = , XF86AudioMicMute, exec, dms ipc call audio micmute

windowrule = match:class firefox, workspace 1
windowrule = match:class org.telegram.desktop, workspace special
windowrule = match:class discord, workspace special
